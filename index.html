<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Design Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* These match the variables used in the guide fragments */
            --color-text-primary: #f4f4f5;
            --color-text-secondary: #a1a1aa;
            --color-text-tertiary: #71717a;
            --color-border-primary: #3f3f46;
            --color-border-secondary: #212124;
            --color-border-tertiary: #1a1a1c;
            --color-background-primary: #0a0a0c;
            --color-background-secondary: #151518;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

            /* UI Specific */
            --bg-deep: #0a0a0c;
            --bg-card: #151518;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.2);
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-title: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-deep);
            color: var(--color-text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Ambient Background Blur */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .glow-1 {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%);
            filter: blur(80px);
        }

        .glow-2 {
            position: absolute;
            bottom: -5%;
            left: -5%;
            width: 40%;
            height: 40%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            filter: blur(80px);
        }

        /* App Navbar */
        .app-nav {
            padding: 16px 24px;
            border-bottom: 1px solid var(--color-border-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--color-text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .nav-links {
            display: flex;
            gap: 16px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--color-border-primary);
            color: var(--color-text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            color: var(--color-text-primary);
            border-color: var(--color-text-secondary);
        }

        /* Home View */
        #home-view {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 60px 24px;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-family: var(--font-title);
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, #71717a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .section-header {
            margin-bottom: 24px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .section-header h2 {
            font-family: var(--font-title);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .guide-card {
            background: var(--bg-card);
            border: 1px solid var(--color-border-secondary);
            border-radius: 16px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .guide-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .guide-icon {
            width: 44px;
            height: 44px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .guide-title {
            font-family: var(--font-title);
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.4;
        }

        /* Reader View */
        #reader-view {
            display: none;
            flex: 1;
            padding: 20px 24px 80px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .reader-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border-tertiary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: var(--color-background-secondary);
            border: 1px solid var(--color-border-primary);
            color: var(--color-text-primary);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover { background: var(--bg-card); }

        #guide-content {
            min-height: 500px;
            position: relative;
        }

        /* Loading Spinner */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            color: var(--color-text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            padding: 40px 24px;
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 0.85rem;
            border-top: 1px solid var(--color-border-secondary);
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .hero { margin-bottom: 40px; }
            .guide-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <nav class="app-nav">
        <a href="#" class="logo" onclick="showHome(); return false;">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            System Design
        </a>
        <div class="nav-links">
            <a href="https://github.com/sharmavipin1608/SystemDesign" target="_blank" class="nav-btn">GitHub</a>
        </div>
    </nav>

    <main>
        <!-- Home Page -->
        <div id="home-view">
            <div class="hero">
                <h1 id="hero-title">Expert Guides</h1>
                <p id="hero-subtitle">High-fidelity interactive cheat sheets for distributed systems, databases, and large-scale architecture.</p>
            </div>

            <div id="guides-loading" class="loading">
                <div class="spinner"></div>
                <p>Scanning ecosystem...</p>
            </div>

            <div id="guide-grid" class="guide-grid" style="display: none;">
                <!-- Guides injected here -->
            </div>
        </div>

        <!-- Reader Page -->
        <div id="reader-view">
            <div class="reader-header">
                <button class="back-btn" id="reader-back-btn" onclick="goBack()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back
                </button>
                <span id="reader-title" style="font-weight: 600; font-family: var(--font-title); font-size: 1.1rem; color: var(--color-text-secondary)"></span>
            </div>
            <div id="guide-content">
                <!-- Content loaded here -->
            </div>
        </div>
    </main>

    <footer>
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; width: 100%;">
            <span>&copy; System Design Knowledge Base</span>
            <a href="#" id="archive-toggle" class="nav-btn" onclick="toggleArchive(); return false;">Browse Archive</a>
        </div>
    </footer>

    <script>
        const CONFIG = {
            owner: 'sharmavipin1608',
            repo: 'SystemDesign',
            basePath: 'guide'
        };

        const state = {
            guides: [],
            projects: [],
            currentPath: CONFIG.basePath,
            isArchive: false
        };

        async function init() {
            // Handle Direct Links via Hash
            const hash = window.location.hash.substring(1);
            if (hash) {
                if (hash === 'archive') {
                    showArchive(true);
                } else if (hash.startsWith('guide/') || hash.startsWith('projects/')) {
                    loadGuide(hash, false);
                }
            } else {
                fetchAllContent();
            }
            
            // Listen for back/forward
            window.onpopstate = () => {
                const h = window.location.hash.substring(1);
                if (!h) showHome(false);
                else if (h === 'archive') showArchive(false);
                else if (h.startsWith('guide/') || h.startsWith('projects/')) loadGuide(h, false);
            };
        }

        async function fetchAllContent() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('guides-loading').style.display = 'flex';
            
            try {
                // Fetch Guides
                const gRes = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/guide`);
                const gFiles = await gRes.json();
                state.guides = gFiles.filter(f => f.name.endsWith('.html')).map(f => ({
                    filename: f.name, title: formatTitle(f.name), path: f.path
                }));

                // Fetch Projects
                const pRes = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/projects`);
                if (pRes.ok) {
                    const pFiles = await pRes.json();
                    state.projects = pFiles.filter(f => f.name.endsWith('.html')).map(f => ({
                        filename: f.name, title: formatTitle(f.name), path: f.path
                    }));
                }

                renderGrid();
                document.getElementById('guides-loading').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('guides-loading').innerHTML = '<p style="color:#ef4444">Failed to load content.</p>';
            }
        }

        function formatTitle(filename) {
            return filename
                .replace('.html', '')
                .split(/[-_]/)
                .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                .join(' ');
        }

        function renderGrid() {
            const grid = document.getElementById('guide-grid');
            grid.style.display = 'block';
            let html = '';

            // Section 1: Guides
            if (state.guides.length > 0) {
                html += `<div class="section-header"><h2>Design Guides</h2></div>`;
                html += `<div class="grid-layout">`;
                html += state.guides.map(g => `
                    <div class="guide-card" onclick="loadGuide('${g.path}')">
                        <div class="guide-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></div>
                        <div class="guide-title">${g.title}</div>
                    </div>
                `).join('');
                html += `</div>`;
            }

            // Divider
            if (state.guides.length > 0 && state.projects.length > 0) {
                html += `<div style="height: 1px; background: var(--color-border-tertiary); margin: 60px 0;"></div>`;
            }

            // Section 2: Projects
            if (state.projects.length > 0) {
                html += `<div class="section-header"><h2>System Design Projects</h2></div>`;
                html += `<div class="grid-layout">`;
                html += state.projects.map(p => `
                    <div class="guide-card" onclick="loadGuide('${p.path}')">
                        <div class="guide-icon" style="color: #10b981; background: rgba(16, 185, 129, 0.1);"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg></div>
                        <div class="guide-title">${p.title}</div>
                    </div>
                `).join('');
                html += `</div>`;
            }

            grid.innerHTML = html;
        }

        async function loadGuide(path, updateHistory = true) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            
            const filename = path.split('/').pop();
            document.getElementById('reader-title').textContent = formatTitle(filename);
            document.getElementById('reader-back-btn').textContent = state.isArchive ? 'Back to Archive' : 'Back to Library';
            
            const container = document.getElementById('guide-content');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Injecting content...</p></div>';

            if (updateHistory) {
                window.location.hash = path;
            }

            try {
                // Fetch the actual local file
                const response = await fetch(path);
                const html = await response.text();
                
                // Content is usually a fragment with <style> and <div class="root">
                container.innerHTML = html;
                
                // Manually execute scripts
                const scripts = container.querySelectorAll('script');
                for (const oldScript of scripts) {
                    try {
                        const newScript = document.createElement('script');
                        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                        
                        let code = oldScript.textContent;
                        code = code.replace(/\bconst\s+/g, 'var ');
                        code = code.replace(/\blet\s+/g, 'var ');
                        newScript.textContent = code;
                        
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    } catch (e) {
                        console.error('Script error in ' + filename, e);
                    }
                }

                window.scrollTo(0, 0);
            } catch (err) {
                container.innerHTML = `<div class="loading"><p style="color:#ef4444">Failed to load ${filename}</p></div>`;
            }
        }

        function showHome(updateHistory = true) {
            resetTheme();
            state.isArchive = false;
            state.currentPath = CONFIG.basePath;
            updateUI();
            if (updateHistory) window.location.hash = '';
            fetchGuides();
        }

        function showArchive(updateHistory = true) {
            resetTheme();
            state.isArchive = true;
            state.currentPath = CONFIG.basePath + '/archive';
            updateUI();
            if (updateHistory) window.location.hash = 'archive';
            fetchGuides();
        }

        function resetTheme() {
            // Force reset body styles that might have been bled by guides
            document.body.style.backgroundColor = '';
            document.body.style.color = '';
            document.body.className = '';
            // Ensure the main hub dark theme is restored
            document.documentElement.style.backgroundColor = '#0a0a0b';
        }

        function toggleArchive() {
            if (state.isArchive) showHome();
            else showArchive();
        }

        function goBack() {
            if (state.isArchive) showArchive();
            else showHome();
        }

        function updateUI() {
            const h1 = document.getElementById('hero-title');
            const p = document.getElementById('hero-subtitle');
            const toggle = document.getElementById('archive-toggle');
            
            if (state.isArchive) {
                h1.textContent = 'Guide Archive';
                p.textContent = 'View historical patterns and deprecated system design templates.';
                toggle.textContent = 'Back to Active Library';
            } else {
                h1.textContent = 'Expert Guides';
                p.textContent = 'High-fidelity interactive cheat sheets for distributed systems, databases, and large-scale architecture.';
                toggle.textContent = 'Browse Archive';
            }
            
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('reader-view').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
